name: Apply Supabase DB Migrations

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run dry-run first, then apply when ready."
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - apply
          - api-apply

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PROJECT_ID: jtypbwgdtqeznhxffpgo
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure Supabase secrets exist
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN GitHub Actions secret."
            exit 1
          fi
          if [ "${{ inputs.mode }}" != "api-apply" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Missing SUPABASE_DB_PASSWORD GitHub Actions secret."
            echo "Add the Supabase project database password in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: ${{ inputs.mode != 'api-apply' }}
        run: supabase link --project-ref "$PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Show migration dry-run
        if: ${{ inputs.mode == 'dry-run' }}
        run: supabase db push --linked --include-all --dry-run --password "$SUPABASE_DB_PASSWORD"

      - name: Apply migrations
        if: ${{ inputs.mode == 'apply' }}
        run: supabase db push --linked --include-all --password "$SUPABASE_DB_PASSWORD"

      - name: Setup Node
        if: ${{ inputs.mode != 'dry-run' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: ${{ inputs.mode != 'dry-run' }}
        run: npm ci

      - name: Apply migration through Management API
        if: ${{ inputs.mode == 'api-apply' }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const projectId = process.env.PROJECT_ID;
          const token = process.env.SUPABASE_ACCESS_TOKEN;
          const query = fs.readFileSync(
            "supabase/migrations/20260424024500_round_context_research_memos.sql",
            "utf8",
          );

          async function main() {
            const response = await fetch(
              `https://api.supabase.com/v1/projects/${projectId}/database/query`,
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${token}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ query, read_only: false }),
              },
            );

            const text = await response.text();
            if (!response.ok) {
              console.error(`Management API query failed: ${response.status} ${response.statusText}`);
              console.error(text);
              process.exit(1);
            }

            console.log("Management API migration query completed.");
            if (text.trim()) {
              console.log(text);
            }
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Verify production Supabase schema
        if: ${{ inputs.mode != 'dry-run' }}
        run: npm run check:supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
